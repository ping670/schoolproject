services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_events
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/school_events
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    command: sh -c "sleep 3 && node server.js"

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/school_events
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    command: sh -c "sleep 3 && node worker.js"

volumes:
  pgdata:
